<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Ultimate Cards</title>
    <style>
        body {
            background-color: #121824;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #233149;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .balance {
            font-size: 20px;
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #3b82f6;
        }
        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background-color: #2563eb; }
        .btn-shop { background-color: #10b981; }
        .btn-shop:hover { background-color: #059669; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .panel {
            background: #1e293b;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #2e3e56;
        }
        h3 { margin-top: 0; color: #94a3b8; border-bottom: 1px solid #2e3e56; padding-bottom: 5px;}
        
        .card-item {
            background: #0f172a;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .card-item:hover { border-color: #475569; }
        .card-item.selected { border-color: #3b82f6; background: #1d4ed8; }
        
        .avatar { font-size: 30px; }
        .tier-Золото { color: #f59e0b; font-weight: bold; }
        .tier-Серебро { color: #94a3b8; font-weight: bold; }
        .tier-Бронза { color: #b45309; font-weight: bold; }

        .log-box {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0;">NHL Ultimate Cards</h1>
            <div id="round-title" style="color:#3b82f6; font-weight:bold; margin-top:5px;">Раунд 1: Твоя Атака</div>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="balance">💰 Монеты: <span id="coin-count">0</span></div>
            <button class="btn btn-shop" onclick="buyPack()">🛒 Купить Пак (150)</button>
        </div>
    </header>

    <div class="grid">
        <!-- ТВОИ ДОСТУПНЫЕ ИГРОКИ -->
        <div class="panel">
            <h3>🏃 Твои Хоккеисты (из инвентаря)</h3>
            <div id="players-list">Загрузка коллекции...</div>
        </div>

        <!-- ТВОИ ДОСТУПНЫЕ КАРТЫ ТАКТИКИ -->
        <div class="panel">
            <h3>🃏 Твои Тактики (из инвентаря)</h3>
            <div id="cards-list">Загрузка тактик...</div>
        </div>
    </div>

    <div style="text-align: center;">
        <button class="btn" style="font-size:20px; width:100%;" onclick="submitTurn()">ПОДТВЕРДИТЬ ХОД (В ЗАКРЫТУЮ) 🏒</button>
    </div>

    <div class="log-box">
        <h3 style="border:none; margin-bottom:5px;">📋 Протокол матча:</h3>
        <div id="log-text">Выберите игрока и карточку, затем нажмите кнопку хода.</div>
    </div>
</div>

<script>
// Глобальные базы данных от сервера
let serverPlayers = {};
let serverCards = {};

// Текущий раунд игры (1 - Атака, 2 - Защита, 3 - Вбрасывание)
let currentRound = 1;

// ЗАГРУЗКА ИЛИ СОЗДАНИЕ ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ (Хранится в браузере)
let profile = JSON.parse(localStorage.getItem('nhl_profile_v2')) || {
    coins: 200, // Даем 200 монет на старте, чтобы сразу можно было купить один пак!
    players: ["celebrini", "levshunov"], // Стартовый набор (только 2 Бронзовых новичка!)
    actions: ["att_wrist", "def_poke"]   // Стартовые карты тактики
};

function saveProfile() {
    localStorage.setItem('nhl_profile_v2', JSON.stringify(profile));
    document.getElementById('coin-count').innerText = profile.coins;
    renderInventory();
}

// Запрашиваем базы у сервера при старте страницы
async function initGame() {
    let res = await fetch('/api/init_deck');
    let data = await res.json();
    serverPlayers = data.players;
    serverCards = data.actions;
    
    saveProfile(); // Отобразит монеты и инвентарь
}

// Отрисовка только тех карт, которые открыты в инвентаре игрока
function renderInventory() {
    // Рендер хоккеистов
    let pList = document.getElementById('players-list');
    pList.innerHTML = "";
    profile.players.forEach(id => {
        let p = serverPlayers[id];
        if(!p) return;
        pList.innerHTML += `
            <div class="card-item" id="p-${id}" onclick="selectItem('player', '${id}')">
                <div class="avatar">${p.image}</div>
                <div>
                    <strong>${p.name}</strong> <span class="tier-${p.tier}">[${p.tier}]</span><br>
                    <small>🔥 АТК: ${p.attack} | 🛡️ ЗАЩ: ${p.defense}</small>
                </div>
            </div>
        `;
    });

    // Рендер карт тактики
    let cList = document.getElementById('cards-list');
    cList.innerHTML = "";
    profile.actions.forEach(id => {
        let c = serverCards[id];
        if(!c) return;
        cList.innerHTML += `
            <div class="card-item" id="c-${id}" onclick="selectItem('card', '${id}')">
                <div>
                    <strong>${c.name}</strong> (${c.type == 'attack' ? 'Атака' : 'Защита'})<br>
                    <small style="color:#a855f7;">${c.desc}</small>
                </div>
            </div>
        `;
    });
}

// Логика выделения кликнутых карт
let selectedPlayer = null;
let selectedCard = null;

function selectItem(type, id) {
    if(type === 'player') {
        if(selectedPlayer) document.getElementById(`p-${selectedPlayer}`).classList.remove('selected');
        selectedPlayer = id;
        document.getElementById(`p-${id}`).classList.add('selected');
    } else {
        if(selectedCard) document.getElementById(`c-${selectedCard}`).classList.remove('selected');
        selectedCard = id;
        document.getElementById(`c-${id}`).classList.add('selected');
    }
}

// ПОКУПКА ПАКА В МАГАЗИНЕ
async function buyPack() {
    if(profile.coins < 150) {
        alert("Не хватает монет! Нужно 150 монет. Играй матчи, чтобы заработать.");
        return;
    }
    
    let res = await fetch('/buy_pack', { method: 'POST', headers: {'Content-Type': 'application/json'} });
    let drop = await res.json();
    
    profile.coins -= 150;
    
    // Добавляем если таких еще нет
    if(!profile.players.includes(drop.player.id)) profile.players.push(drop.player.id);
    if(!profile.actions.includes(drop.card.id)) profile.actions.push(drop.card.id);
    
    saveProfile();
    
    alert(`🎁 ПАК ОТКРЫТ!\n\nИгрок: ${drop.player.data.name} [${drop.player.data.tier}] ${drop.player.data.image}\nКарта: ${drop.player.data.name == drop.card.data.name ? 'Дубль' : drop.card.data.name}`);
}

//ОТПРАВКА ХОДА НА СЕРВЕР
async function submitTurn() {
    if(!selectedPlayer || !selectedCard) {
        alert("Вымой руки перед выходом на лед! Выбери хоккеиста и карту тактики.");
        return;
    }
    
    let res = await fetch('/play', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            player_id: selectedPlayer,
            action_id: selectedCard,
            round_idx: currentRound
        })
    });
    
    let result = await res.json();
    
    // Начисляем монеты на основе результата
    if(result.is_win) {
        profile.coins += 50;
        var rewardText = "<span style='color:#10b981;'>Победа в раунде! Начислено +50 монет.</span>";
    } else {
        profile.coins += 10;
        var rewardText = "<span style='color:#ef4444;'>Поражение в раунде. Утешительные +10 монет.</span>";
    }
    
    // Выводим логи
    document.getElementById('log-text').innerHTML = `
        <strong>Что произошло:</strong> ${result.details}<br>
        <strong>Противостояние ИИ:</strong> против тебя играл ${result.bot_setup}<br>
        <strong>Итоговые счета:</strong> Ты: ${result.player_score} | Бот: ${result.bot_score}<br><br>
        ${rewardText}
    `;
    
    // Переключаем раунды для разнообразия механики
    currentRound++;
    if(currentRound > 3) currentRound = 1;
    
    let titles = {1: "Раунд 1: Твоя Атака", 2: "Раунд 2: Твоя Защита", 3: "Раунд 3: Решающее Вбрасывание"};
    document.getElementById('round-title').innerText = titles[currentRound];
    
    // Сбрасываем выбор
    document.getElementById(`p-${selectedPlayer}`).classList.remove('selected');
    document.getElementById(`c-${selectedCard}`).classList.remove('selected');
    selectedPlayer = null;
    selectedCard = null;
    
    saveProfile();
}

// Запуск при загрузке страницы
window.onload = initGame;
</script>
</body>
</html>
