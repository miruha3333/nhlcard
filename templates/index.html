<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NHL Mini App Arena</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0b0f17; color: #fff; text-align: center; padding: 10px; margin: 0; user-select: none; }
        .profile-box { background: #151f32; border: 1px solid #00d2ff; border-radius: 10px; max-width: 450px; margin: 0 auto 10px; padding: 10px; display: flex; justify-content: space-around; font-size: 12px; }
        .stat-val { font-size: 16px; font-weight: bold; color: #00d2ff; }
        
        .scoreboard { background: #151f32; border: 2px solid #00ff88; border-radius: 12px; width: 240px; margin: 10px auto; padding: 5px; }
        .match-score { font-size: 28px; font-family: monospace; color: #00ff88; }
        .period-text { font-size: 12px; color: #ffb703; font-weight: bold; }

        .section-title { font-size: 12px; margin: 15px 0 5px; color: #8892b0; text-transform: uppercase; }
        .card-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        
        .card { background: #121a2e; border: 2px solid #233554; border-radius: 8px; padding: 8px; width: 95px; cursor: pointer; transition: 0.15s; }
        .card.selected { border-color: #00ff88; background: #0c261c; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .card.tired .card-stat { color: #ff4655 !important; font-weight: bold; } /* ПОДСВЕТКА УСТАЛОСТИ КРАСНЫМ */
        
        .card-emoji { font-size: 24px; }
        .card-name { font-weight: bold; font-size: 11px; margin: 4px 0; height: 26px; display: flex; align-items: center; justify-content: center; }
        .card-stat { font-size: 10px; color: #00d2ff; }
        
        .btn { background: linear-gradient(135deg, #00d2ff, #0066ff); color: white; border: none; padding: 12px 40px; font-size: 16px; font-weight: bold; border-radius: 20px; cursor: pointer; width: 80%; max-width: 300px; }
        .btn-reset { background: #ff4655; display: none; margin: 15px auto; }
        
        #result-box { margin-top: 15px; padding: 12px; background: #151f32; border-radius: 10px; display: none; border: 1px solid #233554; font-size: 14px; }
    </style>
</head>
<body>

    <!-- ПРОФИЛЬ -->
    <div class="profile-box">
        <div><div class="stat-val" id="st-total">0</div><div>Матчей</div></div>
        <div><div class="stat-val" style="color:#4ade80;" id="st-wins">0</div><div>Побед</div></div>
        <div><div class="stat-val" style="color:#f87171;" id="st-losses">0</div><div>Луз</div></div>
        <div><div class="stat-val" id="st-rate">0%</div><div>Винрейт</div></div>
    </div>
    
    <!-- ТАБЛО -->
    <div class="scoreboard">
        <div class="period-text" id="period-display">1-й Период</div>
        <div class="match-score"><span id="p-goals">0</span> : <span id="b-goals">0</span></div>
    </div>
    
    <div id="game-controls">
        <div class="section-title">Твоё звено на этот матч (3Ф + 3З)</div>
        <div class="card-container" id="players-zone"></div>

        <div class="section-title">Тактика на период (3 случайные карты)</div>
        <div class="card-container" id="actions-zone"></div>

        <button class="btn" onclick="nextPeriod()">СЫГРАТЬ ПЕРИОД</button>
    </div>

    <button class="btn btn-reset" id="reset-btn" onclick="startNewMatch()">СЛЕДУЮЩИЙ МАТЧ</button>

    <div id="result-box">
        <h4 id="round-details" style="margin:5px 0;">События...</h4>
        <div style="font-size:12px; color:#ffb703;">Сила дуэли: Вы (<span id="p-power">0</span>) vs Бот (<span id="b-power">0</span>)</div>
        <div style="font-size:11px; color:#aaa; margin-top:4px;">Выбор БОТА: <span id="bot-setup" style="color:#ff4655;">-</span></div>
    </div>

    <script>
        let db = null;
        let matchPlayers = []; // 6 хоккеистов на текущий матч
        let fatiguedPlayers = []; // Кто уже играл и устал
        
        let selectedPlayer = null;
        let selectedAction = null;
        let currentPeriod = 1;
        let pGoals = 0, bGoals = 0;

        let stats = JSON.parse(localStorage.getItem('h_stats')) || { total: 0, wins: 0, losses: 0 };

        function updateStatsUI() {
            document.getElementById('st-total').innerText = stats.total;
            document.getElementById('st-wins').innerText = stats.wins;
            document.getElementById('st-losses').innerText = stats.losses;
            let rate = stats.total > 0 ? Math.round((stats.wins / stats.total) * 100) : 0;
            document.getElementById('st-rate').innerText = `${rate}%`;
        }

        // Загрузка базы данных игры при первом входе
        async function initGame() {
            const res = await fetch('/api/init_deck');
            db = await res.json();
            startNewMatch();
        }

        // НАЧАЛО НОВОГО МАТЧА: Собираем случайный состав
        function startNewMatch() {
            currentPeriod = 1; pGoals = 0; bGoals = 0;
            fatiguedPlayers = [];
            document.getElementById('p-goals').innerText = 0;
            document.getElementById('b-goals').innerText = 0;
            document.getElementById('period-display').innerText = "1-й Период";
            document.getElementById('game-controls').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';

            // Берем 3 случайных форварда и 3 защитника
            let fKeys = Object.keys(db.forwards).sort(() => 0.5 - Math.random()).slice(0, 3);
            let dKeys = Object.keys(db.defenders).sort(() => 0.5 - Math.random()).slice(0, 3);
            
            matchPlayers = [];
            fKeys.forEach(k => matchPlayers.push({id: k, ...db.forwards[k]}));
            dKeys.forEach(k => matchPlayers.push({id: k, ...db.defenders[k]}));

            renderPlayers();
            dealActionCards();
        }

        function renderPlayers() {
            const zone = document.getElementById('players-zone');
            zone.innerHTML = '';
            matchPlayers.forEach(p => {
                let isTired = fatiguedPlayers.includes(p.id);
                // Если уставший — добавляем класс 'tired', уменьшающий статы визуально
                zone.innerHTML += `
                    <div class="card ${isTired ? 'tired' : ''}" id="p-${p.id}" onclick="selectPlayer('${p.id}')">
                        <div class="card-emoji">${p.image}</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-stat">
                            ${isTired ? 'УСТАЛ (-30%)' : `АТК:${p.attack} | ЗЩТ:${p.defense}`}
                        </div>
                    </div>
                `;
            });
        }

        // СДАЧА 3 СЛУЧАЙНЫХ КАРТ ТАКТИКИ НА ПЕРИОД
        function dealActionCards() {
            const zone = document.getElementById('actions-zone');
            zone.innerHTML = '';
            let aKeys = Object.keys(db.actions).sort(() => 0.5 - Math.random()).slice(0, 3);
            
            aKeys.forEach(k => {
                let a = db.actions[k];
                zone.innerHTML += `
                    <div class="card" id="a-${k}" onclick="selectAction('${k}')">
                        <div class="card-emoji">${a.type === 'attack' ? '🔥' : '🧱'}</div>
                        <div class="card-name">${a.name}</div>
                        <div class="card-stat">${a.desc}</div>
                    </div>
                `;
            });
        }

        function selectPlayer(id) {
            document.querySelectorAll('#players-zone .card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`p-${id}`).classList.add('selected');
            selectedPlayer = id;
        }

        function selectAction(id) {
            document.querySelectorAll('#actions-zone .card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`a-${id}`).classList.add('selected');
            selectedAction = id;
        }

        async function nextPeriod() {
            if (!selectedPlayer || !selectedAction) {
                alert("Выбери хоккеиста и карту тактики!");
                return;
            }

            const response = await fetch('/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    player_id: selectedPlayer, 
                    action_id: selectedAction,
                    fatigued_players: fatiguedPlayers 
                })
            });
            const result = await response.json();

            if (result.winner === 'player') pGoals++;
            if (result.winner === 'bot') bGoals++;

            document.getElementById('p-goals').innerText = pGoals;
            document.getElementById('b-goals').innerText = bGoals;
            
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('round-details').innerText = result.details;
            document.getElementById('p-power').innerText = result.player_score;
            document.getElementById('b-power').innerText = result.bot_score;
            document.getElementById('bot-setup').innerText = result.bot_setup;

            // Хоккеист устает после использования
            if (!fatiguedPlayers.includes(selectedPlayer)) {
                fatiguedPlayers.push(selectedPlayer);
            }

            selectedPlayer = null; selectedAction = null;
            
            currentPeriod++;
            if (currentPeriod <= 3) {
                document.getElementById('period-display').innerText = `${currentPeriod}-й Период`;
                renderPlayers();
                dealActionCards(); // Новая сдача карт на период!
            } else {
                endMatch();
            }
        }

        function endMatch() {
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'block';
            stats.total++;
            
            if (pGoals > bGoals) {
                document.getElementById('round-details').innerText = "🏆 ФИНАЛЬНАЯ СИРЕНА: ВЫ ПОБЕДИЛИ!";
                document.getElementById('period-display').innerText = "ПОБЕДА";
                stats.wins++;
            } else if (pGoals < bGoals) {
                document.getElementById('round-details').innerText = "❌ ФИНАЛЬНАЯ СИРЕНА: ПОРАЖЕНИЕ.";
                document.getElementById('period-display').innerText = "ЛУЗ";
                stats.losses++;
            } else {
                document.getElementById('round-details').innerText = "🤝 ОВЕРТАЙМ: НИЧЬЯ БОЕВАЯ!";
                document.getElementById('period-display').innerText = "НИЧЬЯ";
            }
            localStorage.setItem('h_stats', JSON.stringify(stats));
            updateStatsUI();
        }

        updateStatsUI();
        initGame();
    </script>
</body>
</html>
