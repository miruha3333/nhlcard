<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Card Arena & Profile</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0f141c; color: #fff; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00d2ff; text-shadow: 0 0 10px rgba(0,210,255,0.3); margin-bottom: 5px; }
        
        /* СТИЛЬ ЛИЧНОГО КАБИНЕТА */
        .profile-box {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #38bdf8;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto 20px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .profile-stat { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: #38bdf8; }
        .stat-lbl { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .win-rate { color: #4ade80; font-size: 24px; font-weight: bold; }

        /* СТИЛЬ ХОККЕЙНОГО ТАБЛО */
        .scoreboard {
            background: #1e293b;
            border: 3px solid #00d2ff;
            border-radius: 15px;
            width: 280px;
            margin: 15px auto;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0,210,255,0.2);
        }
        .match-score { font-size: 36px; font-weight: bold; font-family: 'Courier New', monospace; color: #00ff88; }
        .period-text { font-size: 14px; color: #ffb703; text-transform: uppercase; letter-spacing: 2px; }

        .section-title { font-size: 14px; margin: 20px 0 10px; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; }
        .card-container { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
        
        .card {
            background: #172237;
            border: 2px solid #233554;
            border-radius: 10px;
            padding: 12px;
            width: 125px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .card:hover { transform: translateY(-3px); border-color: #00d2ff; }
        .card.selected { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.3); background: #0f2d24; }
        .card-emoji { font-size: 32px; margin-bottom: 5px; }
        .card-name { font-weight: bold; font-size: 13px; margin-bottom: 5px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .card-stat { font-size: 11px; color: #00d2ff; }
        
        .btn {
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            color: white; border: none; padding: 12px 35px; font-size: 16px;
            font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-reset { background: #ff4655; margin-top: 15px; display: none; }
        
        #result-box { margin-top: 20px; padding: 15px; background: #172237; border-radius: 12px; display: none; border: 1px solid #233554; }
        .duel-powers { font-size: 18px; color: #ffb703; margin: 5px 0; }
    </style>
</head>
<body>

    <!-- ЛИЧНЫЙ КАБИНЕТ ИГРОКА -->
    <div class="profile-box">
        <div class="profile-stat">
            <div class="stat-val" id="stat-total">0</div>
            <div class="stat-lbl">Матчей</div>
        </div>
        <div class="profile-stat">
            <div class="stat-val" style="color: #4ade80;" id="stat-wins">0</div>
            <div class="stat-lbl">Побед</div>
        </div>
        <div class="profile-stat">
            <div class="stat-val" style="color: #94a3b8;" id="stat-draws">0</div>
            <div class="stat-lbl">Ничьих</div>
        </div>
        <div class="profile-stat">
            <div class="stat-val" style="color: #f87171;" id="stat-losses">0</div>
            <div class="stat-lbl">Поражений</div>
        </div>
        <div class="profile-stat">
            <div class="win-rate" id="stat-rate">0%</div>
            <div class="stat-lbl">Винрейт</div>
        </div>
    </div>

    <h1>🏒 NHL SCOREBOARD MVP 🏒</h1>
    
    <!-- ТАБЛО МАТЧА -->
    <div class="scoreboard">
        <div class="period-text" id="period-display">1-й Период</div>
        <div class="match-score"><span id="p-goals">0</span> : <span id="b-goals">0</span></div>
        <div style="font-size: 11px; color: #aaa;">ВЫ (Атака) vs БОТ (Защита)</div>
    </div>
    
    <div id="game-controls">
        <div class="section-title">1. Выбери хоккеиста на раунд</div>
        <div class="card-container" id="players-zone"></div>

        <div class="section-title">2. Примени тактику</div>
        <div class="card-container" id="actions-zone"></div>

        <button class="btn" id="play-btn" onclick="nextPeriod()">СЫГРАТЬ ПЕРИОД</button>
    </div>

    <button class="btn btn-reset" id="reset-btn" onclick="resetMatch()">НАЧАТЬ НОВЫЙ МАТЧ</button>

    <!-- Окно событий периода -->
    <div id="result-box">
        <h3 id="round-details">События на льду...</h3>
        <div class="duel-powers">Общая сила: Вы (<span id="p-power">0</span>) vs Бот (<span id="b-power">0</span>)</div>
        <p style="font-size: 12px; color: #aaa;">Бот выставил: <span id="bot-setup" style="color: #ff4655;">-</span></p>
    </div>

    <script>
        let selectedPlayer = null;
        let selectedAction = null;
        
        let currentPeriod = 1;
        let playerGoals = 0;
        let botGoals = 0;

        // Инициализация статистики из памяти браузера
        let stats = JSON.parse(localStorage.getItem('hockey_stats')) || { total: 0, wins: 0, draws: 0, losses: 0 };

        function updateProfileUI() {
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-wins').innerText = stats.wins;
            document.getElementById('stat-draws').innerText = stats.draws;
            document.getElementById('stat-losses').innerText = stats.losses;
            
            let rate = stats.total > 0 ? Math.round((stats.wins / stats.total) * 100) : 0;
            document.getElementById('stat-rate').innerText = `${rate}%`;
        }

        async function loadCards() {
            const res = await fetch('/api/cards');
            const data = await res.json();
            
            const pZone = document.getElementById('players-zone');
            pZone.innerHTML = '';
            for (let id in data.players) {
                let p = data.players[id];
                pZone.innerHTML += `
                    <div class="card" id="p-${id}" onclick="selectPlayer('${id}')">
                        <div class="card-emoji">${p.image}</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-stat">АТК: ${p.attack} | ЗЩТ: ${p.defense}</div>
                    </div>
                `;
            }

            const aZone = document.getElementById('actions-zone');
            aZone.innerHTML = '';
            for (let id in data.actions) {
                let a = data.actions[id];
                aZone.innerHTML += `
                    <div class="card" id="a-${id}" onclick="selectAction('${id}')">
                        <div class="card-emoji">${a.type === 'attack' ? '🔥' : '🧱'}</div>
                        <div class="card-name">${a.name}</div>
                        <div class="card-stat">${a.desc}</div>
                    </div>
                `;
            }
        }

        function selectPlayer(id) {
            document.querySelectorAll('#players-zone .card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`p-${id}`).classList.add('selected');
            selectedPlayer = id;
        }

        function selectAction(id) {
            document.querySelectorAll('#actions-zone .card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`a-${id}`).classList.add('selected');
            selectedAction = id;
        }

        async function nextPeriod() {
            if (!selectedPlayer || !selectedAction) {
                alert("Выбери хоккеиста и карту тактики!");
                return;
            }

            const response = await fetch('/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_id: selectedPlayer, action_id: selectedAction })
            });
            const result = await response.json();

            if (result.winner === 'player') playerGoals++;
            if (result.winner === 'bot') botGoals++;

            document.getElementById('p-goals').innerText = playerGoals;
            document.getElementById('b-goals').innerText = botGoals;
            
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('round-details').innerText = result.details;
            document.getElementById('p-power').innerText = result.player_score;
            document.getElementById('b-power').innerText = result.bot_score;
            document.getElementById('bot-setup').innerText = result.bot_setup;

            selectedPlayer = null;
            selectedAction = null;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));

            currentPeriod++;
            if (currentPeriod <= 3) {
                document.getElementById('period-display').innerText = `${currentPeriod}-й Период`;
            } else {
                endMatch();
            }
        }

        function endMatch() {
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'inline-block';
            
            stats.total++;
            let finalTitle = "";
            if (playerGoals > botGoals) {
                finalTitle = "🏆 МАТЧ ЗАВЕРШЕН: ВЫ ПОБЕДИЛИ!";
                document.getElementById('period-display').innerText = "ПОБЕДА";
                stats.wins++;
            } else if (playerGoals < botGoals) {
                finalTitle = "❌ МАТЧ ЗАВЕРШЕН: БОТ ОКАЗАЛСЯ СИЛЬНЕЕ.";
                document.getElementById('period-display').innerText = "ПОРАЖЕНИЕ";
                stats.losses++;
            } else {
                finalTitle = "🤝 МАТЧ ЗАВЕРШЕН: НИЧЬЯ!";
                document.getElementById('period-display').innerText = "НИЧЬЯ";
                stats.draws++;
            }
            
            // Сохраняем обновленную статику в память браузера
            localStorage.setItem('hockey_stats', JSON.stringify(stats));
            updateProfileUI();
            
            document.getElementById('round-details').innerText = finalTitle;
        }

        function resetMatch() {
            currentPeriod = 1;
            playerGoals = 0;
            botGoals = 0;
            document.getElementById('p-goals').innerText = 0;
            document.getElementById('b-goals').innerText = 0;
            document.getElementById('period-display').innerText = "1-й Период";
            document.getElementById('game-controls').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';
            loadCards();
        }

        // Запуск при старте страницы
        updateProfileUI();
        loadCards();
    </script>
</body>
</html>
