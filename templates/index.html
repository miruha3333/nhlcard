<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Ultimate Cards</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Экраны SPA */
        .screen { display: none; animation: fadeIn 0.2s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Кнопки */
        .btn { color: white; border: none; padding: 8px 16px; font-size: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn:hover { opacity: 0.9; }
        .btn-primary { background-color: #3b82f6; }
        .btn-shop { background-color: #10b981; }
        .btn-secondary { background-color: #475569; padding: 6px 12px; font-size: 13px; }
        .btn-play { background-color: #ef4444; font-size: 18px; padding: 12px 35px; border-radius: 8px; }

        /* Компактная верхняя панель */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #1e293b; padding: 6px 12px; border-radius: 6px; }
        .coins-text { font-size: 14px; color: #fbbf24; font-weight: bold; }
        .status-mid { font-size: 14px; font-weight: bold; color: #3b82f6; }

        /* Компактное Табло */
        .scoreboard { display: flex; justify-content: center; align-items: center; gap: 20px; background: #1e293b; padding: 8px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 12px; }
        .score-num { font-size: 24px; font-weight: bold; color: #fbbf24; min-width: 30px; text-align: center; }
        .score-text { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        /* Сетки карточек (Мини-формат) */
        .grid-container { background: #1e293b; border-radius: 8px; padding: 10px; border: 1px solid #334155; margin-bottom: 12px; }
        .grid-container h4 { margin: 0 0 8px 0; font-size: 13px; color: #cbd5e1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
        
        /* Мини-Карточка */
        .card-item { background: #0b1120; padding: 6px; border-radius: 6px; cursor: pointer; border: 2px solid #334155; text-align: center; position: relative; font-size: 12px; }
        .card-item:hover:not(.fatigued) { border-color: #4b5563; }
        .card-item.selected { border-color: #3b82f6; background: #1e3a8a; }
        
        /* Усталость */
        .card-item.fatigued { opacity: 0.35; cursor: not-allowed; filter: grayscale(100%); }
        .fatigue-badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 9px; padding: 1px 4px; border-radius: 4px; font-weight: bold; }

        .avatar { font-size: 22px; margin-bottom: 2px; }
        .tier-Золото { color: #fbbf24; font-weight: bold; }
        .tier-Серебро { color: #cbd5e1; font-weight: bold; }
        .tier-Бронза { color: #d97706; font-weight: bold; }

        .log-box { background: #020617; padding: 10px; border-radius: 6px; margin-top: 10px; font-family: monospace; font-size: 12px; max-height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="screen-menu" class="screen active">
        <div style="text-align: center; margin-top: 60px;">
            <h2 style="font-size: 32px; margin-bottom: 5px; letter-spacing: 1px;">NHL ULTIMATE CARDS</h2>
            <div style="font-size: 16px; color: #fbbf24; margin-bottom: 30px;">Монеты: <span class="coin-display">0</span></div>
            <button class="btn btn-play" onclick="startMatch()">🏒 ИГРАТЬ МАТЧ</button>
            <br><br>
            <button class="btn btn-shop" style="font-size: 15px;" onclick="switchScreen('screen-shop')">🛒 Магазин Паков</button>
        </div>
    </div>

    <div id="screen-shop" class="screen">
        <div class="header-top">
            <span style="font-size: 14px; font-weight: bold;">🛒 Магазин</span>
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="coins-text">Монеты: <span class="coin-display">0</span></div>
                <button class="btn btn-secondary" onclick="switchScreen('screen-menu')">Назад</button>
            </div>
        </div>
        <div style="text-align: center; background: #1e293b; padding: 25px; border-radius: 8px;">
            <div style="font-size: 50px; margin-bottom: 10px;">🎁</div>
            <h4 style="margin: 0 0 5px 0;">Стандартный Пак</h4>
            <p style="color: #94a3b8; font-size: 13px; margin: 0 0 15px 0;">1 игрок + 1 тактика.<br>Шанс на золото: 15%</p>
            <button class="btn btn-shop" onclick="buyPack()">ОТКРЫТЬ ЗА 150 МОНЕТ</button>
        </div>
        <div id="shop-result" style="margin-top: 15px; text-align: center; font-size: 14px; color: #10b981; font-weight: bold;"></div>
    </div>

    <div id="screen-game" class="screen">
        <div class="header-top">
            <button class="btn btn-secondary" onclick="endMatch(true)">Назад</button>
            <div id="period-display" class="status-mid">Период 1 · Атака ⚔️</div>
            <div class="coins-text">Монеты: <span class="coin-display">0</span></div>
        </div>

        <div class="scoreboard">
            <div class="score-text">Ты</div>
            <div class="score-num" id="score-player">0</div>
            <div class="score-text" style="color: #475569;">:</div>
            <div class="score-num" id="score-bot">0</div>
            <div class="score-text">ИИ</div>
        </div>

        <div class="grid-container">
            <h4>🏃 Твой Ростер</h4>
            <div id="players-list" class="grid"></div>
        </div>

        <div class="grid-container">
            <h4>🃏 Тактика</h4>
            <div id="cards-list" class="grid"></div>
        </div>

        <button class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 10px;" onclick="submitTurn()">ПОДТВЕРДИТЬ ХОД</button>

        <div class="log-box" id="match-log">
            Ожидание выбора...
        </div>
    </div>

</div>

<script>
let serverPlayers = {}, serverCards = {};
let profile = JSON.parse(localStorage.getItem('nhl_v4')) || { coins: 300, players: ["celebrini", "levshunov", "michkov"], actions: ["att_wrist", "def_poke", "att_onetimer"] };

// Состояние текущего матча (Период: 1-3, Раунд внутри периода: 1-Атака, 2-Защита, 3-Вбрасывание)
let matchState = { period: 1, round: 1, pScore: 0, bScore: 0, fatiguedPlayer: null };
let selectedPlayer = null, selectedCard = null;

const ROUND_NAMES = { 1: "Атака ⚔️", 2: "Защита 🛡️", 3: "Вбрасывание 🏒" };

async function init() {
    let res = await fetch('/api/init_deck');
    let data = await res.json();
    serverPlayers = data.players; serverCards = data.actions;
    updateUI();
}

function updateUI() {
    localStorage.setItem('nhl_v4', JSON.stringify(profile));
    document.querySelectorAll('.coin-display').forEach(el => el.innerText = profile.coins);
}

function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    document.getElementById('shop-result').innerText = "";
}

function startMatch() {
    if(profile.players.length < 2) {
        alert("В команде должно быть минимум 2 игрока из-за системы усталости!");
        return;
    }
    matchState = { period: 1, round: 1, pScore: 0, bScore: 0, fatiguedPlayer: null };
    document.getElementById('score-player').innerText = 0;
    document.getElementById('score-bot').innerText = 0;
    document.getElementById('match-log').innerHTML = "Матч начался! Первый период.";
    selectedPlayer = null; selectedCard = null;
    updateMatchUI();
    switchScreen('screen-game');
}

function updateMatchUI() {
    document.getElementById('period-display').innerText = `Период ${matchState.period} · ${ROUND_NAMES[matchState.round]}`;
    
    // Рендер игроков
    let pList = document.getElementById('players-list');
    pList.innerHTML = "";
    profile.players.forEach(id => {
        let p = serverPlayers[id]; if(!p) return;
        let isFatigued = (id === matchState.fatiguedPlayer);
        let fatigueHtml = isFatigued ? '<div class="fatigue-badge">💤</div>' : '';
        let classes = `card-item ${isFatigued ? 'fatigued' : ''} ${id === selectedPlayer ? 'selected' : ''}`;
        
        pList.innerHTML += `
            <div class="${classes}" id="p-${id}" onclick="${isFatigued ? '' : `selectItem('player', '${id}')`}">
                ${fatigueHtml}
                <div class="avatar">${p.image}</div>
                <div style="font-weight:bold; white-space:nowrap; overflow:hidden;">${p.name}</div>
                <div class="tier-${p.tier}" style="font-size:10px;">${p.tier}</div>
                <div style="font-size:10px; color:#94a3b8; margin-top:2px;">А:${p.attack} З:${p.defense}</div>
            </div>`;
    });

    // Рендер карт
    let cList = document.getElementById('cards-list');
    cList.innerHTML = "";
    profile.actions.forEach(id => {
        let c = serverCards[id]; if(!c) return;
        let isAtk = c.type === 'attack';
        cList.innerHTML += `
            <div class="card-item ${id === selectedCard ? 'selected' : ''}" id="c-${id}" onclick="selectItem('card', '${id}')">
                <div style="color: ${isAtk ? '#ef4444' : '#3b82f6'}; font-weight:bold;">${isAtk ? '⚔️' : '🛡️'} ${c.name}</div>
                <div style="font-size:10px; color:#94a3b8; margin-top:2px;">${c.desc.split(' ')[0]} ${c.desc.split(' ')[1] || ''}</div>
            </div>`;
    });
}

function selectItem(type, id) {
    if(type === 'player') selectedPlayer = id;
    else selectedCard = id;
    updateMatchUI();
}

async function submitTurn() {
    if(!selectedPlayer || !selectedCard) { alert("Выберите игрока и тактику!"); return; }
    
    let res = await fetch('/play', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ player_id: selectedPlayer, action_id: selectedCard, round_idx: matchState.round })
    });
    let result = await res.json();
    
    if(result.is_win) matchState.pScore++;
    else if (!result.is_tie && !result.is_win) matchState.bScore++; 

    document.getElementById('score-player').innerText = matchState.pScore;
    document.getElementById('score-bot').innerText = matchState.bScore;
    
    document.getElementById('match-log').innerHTML = `
        <strong>П${matchState.period} (${ROUND_NAMES[matchState.round]}):</strong> ${result.details}<br>
        <strong>ИИ:</strong> ${result.bot_setup}
    `;

    // Механика усталости: игрок засыпает на ОДИН следующий ход
    matchState.fatiguedPlayer = selectedPlayer;
    selectedPlayer = null; selectedCard = null;
    
    // Продвигаем внутренний раунд
    matchState.round++;
    
    // Если прошли все 3 раунда (Атака, Защита, Вбрасывание), переходим к следующему периоду
    if(matchState.round > 3) {
        matchState.round = 1;
        matchState.period++;
    }
    
    // Конец матча после 3 периодов (всего 9 ходов)
    if(matchState.period > 3) {
        setTimeout(() => endMatch(false), 1500);
        document.getElementById('match-log').innerHTML += `<br><span style="color:#fbbf24; font-weight:bold;">Матч завершен! Подсчет очков...</span>`;
    } else {
        updateMatchUI();
    }
}

function endMatch(surrendered) {
    let msg = "";
    if(surrendered) {
        profile.coins += 5; msg = "Матч прерван. Награда: 5 монет.";
    } else if(matchState.pScore > matchState.bScore) {
        profile.coins += 60; msg = `ПОБЕДА (${matchState.pScore}:${matchState.bScore})! Награда: 60 монет.`;
    } else if(matchState.pScore < matchState.bScore) {
        profile.coins += 15; msg = `Поражение (${matchState.pScore}:${matchState.bScore}). Награда: 15 монет.`;
    } else {
        profile.coins += 25; msg = `Ничья (${matchState.pScore}:${matchState.bScore}). Награда: 25 монет.`;
    }
    alert(msg);
    updateUI();
    switchScreen('screen-menu');
}

async function buyPack() {
    if(profile.coins < 150) { alert("Не хватает монет!"); return; }
    let res = await fetch('/buy_pack', { method: 'POST' });
    let drop = await res.json();
    
    profile.coins -= 150;
    if(!profile.players.includes(drop.player.id)) profile.players.push(drop.player.id);
    if(!profile.actions.includes(drop.card.id)) profile.actions.push(drop.card.id);
    
    updateUI();
    document.getElementById('shop-result').innerHTML = `Выпал: ${drop.player.data.name} [${drop.player.data.tier}]<br>Тактика: ${drop.card.data.name}`;
}

window.onload = init;
</script>
</body>
</html>
